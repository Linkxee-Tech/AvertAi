services:
  - type: web
    name: avertai-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      - key: AFRICAS_TALKING_USERNAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: GCP_PROJECT_ID
        sync: false

  - type: cron
    name: avertai-batch-inference
    env: python
    schedule: "0 */6 * * *" # Every 6 hours
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python scripts/run_batch_inference.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
