<style>
  :root{
    --bg:#0E1A1B; --panel:#152524; --panel-2:#1B2E2C; --line:#28403B;
    --sand:#EDE6D6; --sand-dim:#9BAEA0; --teal:#4FA8A0;
    --green:#008000; --yellow:#FFD700; --red:#FF0000; --red-glow: rgba(255,0,0,0.45);
    --radius: 3px; --mono:'IBM Plex Mono',monospace; --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--sand); font-family:var(--body); width:100%; height:100%; overflow:hidden;}
  ::selection{background:var(--teal); color:#0E1A1B;}
  button, input, select, textarea{font-family:inherit;}
  input, select, textarea{ background:#0C1717; border:1px solid var(--line); color:var(--sand); border-radius:4px; padding:9px 10px; font-size:13px; }
  label{ font-family:var(--mono); font-size:9.5px; color:var(--sand-dim); text-transform:uppercase; letter-spacing:0.8px; display:block; margin:10px 0 4px; }
  .primary-btn{ width:100%; background:var(--teal); color:#0E1A1B; border:none; font-weight:600; font-size:13.5px;
    padding:12px; border-radius:6px; cursor:pointer; margin-top:14px; }
  .btn-sm{ font-family:var(--mono); font-size:11px; background:transparent; color:var(--teal); border:1px solid var(--teal);
    padding:7px 12px; border-radius:var(--radius); cursor:pointer; }
  .btn-sm.danger{ color:var(--red); border-color:var(--red); }
  .mono{ font-family:var(--mono); }
  .panel-eyebrow{ font-family:var(--mono); font-size:10px; color:var(--sand-dim); letter-spacing:1.4px; text-transform:uppercase; }
  .chart-box{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px; }
  .skeleton{ background:linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%); background-size:200% 100%;
    animation:shimmer 1.4s infinite; border-radius:4px; height:14px; margin:6px 0; }
  @keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

  /* ===== MODAL ===== */
  .modal-overlay{ position:fixed; inset:0; background:rgba(6,12,11,0.75); display:none; align-items:center; justify-content:center; z-index:60; padding:20px; }
  .modal-overlay.show{ display:flex; }
  .modal-card{ width:100%; max-width:320px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px; }
  .modal-title{ font-family:var(--display); font-weight:600; font-size:15px; margin-bottom:10px; }
  .modal-body{ font-size:13px; color:var(--sand-dim); line-height:1.6; }
  .modal-actions{ display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }

  /* ===== APP SHELL ===== */
  #appShell{ height:100dvh; display:flex; flex-direction:column; }
  #phoneContent{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .m-screen{ display:none; padding:20px 18px 90px; min-height:100%; }
  .m-screen.active{ display:block; }
  .m-h1{ font-family:var(--display); font-weight:700; font-size:20px; margin-bottom:4px; }
  .m-sub{ font-family:var(--mono); font-size:11px; color:var(--sand-dim); margin-bottom:16px; text-transform:uppercase; letter-spacing:0.6px; }
  .brand-mark{ width:44px; height:44px; border:2px solid var(--teal); border-radius:50%; position:relative; margin:0 auto; }
  .brand-mark::before{ content:''; position:absolute; inset:9px; border:2px solid var(--red); border-radius:50%; animation:pulse-ring 2.4s ease-in-out infinite; }
  @keyframes pulse-ring{ 0%,100%{transform:scale(0.7);opacity:.9;} 50%{transform:scale(1);opacity:0.3;} }

  /* ===== BOTTOM TAB BAR ===== */
  #bottomTabBar{ display:none; border-top:1px solid var(--line); background:#0C1717; padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    justify-content:space-around; flex-shrink:0; }
  #bottomTabBar button{ background:none; border:none; color:var(--sand-dim); font-family:var(--mono); font-size:9.5px;
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 8px; cursor:pointer; }
  #bottomTabBar button .tab-icon{ font-size:18px; }
  #bottomTabBar button.active{ color:var(--teal); }

  /* ===== ONBOARDING ===== */
  .onboard-dots{ display:flex; gap:5px; justify-content:center; margin:14px 0; }
  .onboard-dots span{ width:6px; height:6px; border-radius:50%; background:var(--line); }
  .onboard-dots span.active{ background:var(--teal); }
  .lang-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
  .lang-grid button{ background:var(--panel); border:1px solid var(--line); color:var(--sand); padding:12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .lang-pick-btn.active{ border-color:var(--teal) !important; color:var(--teal) !important; }
  .otp-mini{ display:flex; gap:8px; margin-top:10px; }
  .otp-mini input{ width:15%; height:44px; text-align:center; font-family:var(--mono); font-size:17px; }

  /* ===== HOME ===== */
  .action-badge{ border-radius:10px; padding:18px; display:flex; flex-direction:column; gap:6px; }
  .action-badge.RED{ background:rgba(193,69,61,0.18); border:1px solid var(--red); }
  .action-badge.YELLOW{ background:rgba(217,164,65,0.18); border:1px solid var(--yellow); }
  .action-badge.GREEN{ background:rgba(110,148,80,0.18); border:1px solid var(--green); }
  .action-badge .code{ font-family:var(--display); font-weight:700; font-size:15px; letter-spacing:0.3px; }
  .action-badge .txt{ font-size:13.5px; line-height:1.55; }
  .badge-switch{ display:flex; gap:6px; }
  .badge-switch button{ font-family:var(--mono); font-size:10px; padding:6px 10px; border-radius:4px; border:1px solid var(--line); background:var(--panel); color:var(--sand-dim); cursor:pointer; }
  .weather-mini{ display:flex; gap:16px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 16px; margin-top:14px; font-family:var(--mono); font-size:11px; color:var(--sand-dim); }
  .weather-mini b{ color:var(--sand); font-family:var(--display); font-size:19px; }
  .offline-snackbar{ display:flex; align-items:center; gap:8px; background:#1B2E2C; border:1px solid var(--yellow); border-radius:8px; padding:9px 12px; margin-top:12px; font-family:var(--mono); font-size:10.5px; color:var(--yellow); }
  .sos-btn{ width:100%; margin-top:20px; background:var(--red); color:#fff; border:none; font-family:var(--display); font-weight:700; font-size:14px;
    padding:14px; border-radius:10px; cursor:pointer; letter-spacing:0.3px; animation:sos-pulse 2.2s infinite; }
  @keyframes sos-pulse{ 0%{ box-shadow:0 0 0 0 rgba(193,69,61,0.45);} 70%{ box-shadow:0 0 0 12px rgba(193,69,61,0);} 100%{ box-shadow:0 0 0 0 rgba(193,69,61,0);} }

  /* ===== MAP ===== */
  .mini-mosaic{ display:grid; grid-template-columns:repeat(16,1fr); gap:2px; border-radius:8px; overflow:hidden; }
  .cell{ aspect-ratio:1; border-radius:1px; }
  .cell.g{ background: color-mix(in srgb, var(--green) 55%, #0C1717); }
  .cell.y{ background: color-mix(in srgb, var(--yellow) 60%, #0C1717); }
  .cell.r{ background: color-mix(in srgb, var(--red) 68%, #0C1717); }
  .map-legend{ display:flex; gap:16px; align-items:center; font-family:var(--mono); font-size:10.5px; color:var(--sand-dim); flex-wrap:wrap; }
  .legend-item{ display:flex; align-items:center; gap:5px; }
  .legend-swatch{ width:9px; height:9px; border-radius:2px; }
  .search-box{ width:100%; }

  /* ===== REPORT ===== */
  .quick-report-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .quick-report-grid button{ background:var(--panel); border:1px solid var(--line); color:var(--sand); padding:16px 10px; border-radius:10px; cursor:pointer; font-size:13px; }
  .quick-report-grid button.active{ border-color:var(--teal); color:var(--teal); background:rgba(79,168,160,0.1); }
  .fab{ position:fixed; bottom:96px; right:20px; width:52px; height:52px; border-radius:50%; background:var(--teal); color:#0E1A1B;
    border:none; font-size:22px; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.4); z-index:5; }

  /* ===== INBOX ===== */
  .inbox-item{ display:flex; gap:10px; padding:14px 0; border-bottom:1px solid var(--line); cursor:pointer; }
  .inbox-item .unread-dot{ width:8px; height:8px; border-radius:50%; background:var(--teal); margin-top:6px; flex-shrink:0; }
  .inbox-item.read .unread-dot{ background:transparent; }
  .inbox-item .txt{ font-size:13px; } .inbox-item .t{ font-family:var(--mono); font-size:10px; color:var(--sand-dim); margin-top:2px; }

  /* ===== SETTINGS ===== */
  .settings-row{ display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .switch{ width:38px; height:22px; background:var(--line); border-radius:11px; position:relative; cursor:pointer; flex-shrink:0; }
  .switch.on{ background:var(--teal); }
  .switch::after{ content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; background:var(--sand); border-radius:50%; transition:.15s; }
  .switch.on::after{ left:18px; }
  #backendStatusChip{ font-family:var(--mono); font-size:9.5px; color:var(--sand-dim); margin-top:16px; display:flex; align-items:center; gap:6px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--green); }
  .dot.busy{ background:var(--yellow); }
</style>

<script>
window.onerror = function(msg, url, line, col, error) {
  alert("JS Error: " + msg + " at line " + line);
};

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

const API_BASE = (window.AVERTAI_API_BASE) || 'http://localhost:8000/api/v1';
let DEMO_MODE = true;
let mobileAccessToken = null;

async function apiFetch(path, { method = 'GET', body, token, timeoutMs = 6000 } = {}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
    return data;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}
async function checkBackendReachable() {
  try { await apiFetch('/health', { timeoutMs: 2500 }); DEMO_MODE = false; }
  catch { DEMO_MODE = true; }
  const chip = document.getElementById('backendStatusChip');
  if (chip) chip.innerHTML = DEMO_MODE
    ? `<span class="dot busy"></span> Offline — cached data`
    : `<span class="dot"></span> Connected to AvertAI`;
    
  if (DEMO_MODE) {
      // Offline Prediction Fallback (Checkpoint 6.4)
      const lastSyncStr = localStorage.getItem('last_sync_time');
      if (lastSyncStr) {
          const lastSync = new Date(lastSyncStr);
          const hoursSince = (new Date() - lastSync) / (1000 * 60 * 60);
          if (hoursSince > 24) {
              generateRoughPrediction();
          }
      } else {
          generateRoughPrediction();
      }
  } else {
      localStorage.setItem('last_sync_time', new Date().toISOString());
  }
}

function generateRoughPrediction() {
    // Checkpoint 6.4: Local INT8 model fallback
    console.log("Internet down > 24h. Falling back to local INT8 model (simulated).");
    const barometerPressure = 1012; // Simulated barometer
    const roughCode = barometerPressure < 1005 ? "RED" : "YELLOW";
    const b = document.querySelector(`.badge-switch button[data-code="${roughCode}"]`);
    if(b) b.click();
}

// ---------------- LIGHTWEIGHT CHART RENDERER (no external dependency) ----------------
function drawLineChart(canvasId, series, labels, opts={}){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const cssW = canvas.clientWidth || opts.width || 400;
  const cssH = opts.height || canvas.clientHeight || 160;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  canvas.style.width = cssW+'px'; canvas.style.height = cssH+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,cssW,cssH);
  const pad = 22;
  const allVals = series.flatMap(s=>s.data);
  const min = Math.min(...allVals, 0), max = Math.max(...allVals, 1);
  const xStep = labels.length>1 ? (cssW - pad*2) / (labels.length - 1) : 0;
  const yScale = v => cssH - pad - ((v-min)/((max-min)||1))*(cssH-pad*2);
  ctx.strokeStyle = '#28403B'; ctx.lineWidth = 1;
  for(let i=0;i<=3;i++){ const y = pad + i*(cssH-pad*2)/3; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(cssW-pad,y); ctx.stroke(); }
  series.forEach(s=>{
    ctx.strokeStyle = s.color; ctx.lineWidth = 2;
    ctx.setLineDash(s.dash || []);
    ctx.beginPath();
    s.data.forEach((v,i)=>{ const x = pad + i*xStep; const y = yScale(v); i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
    ctx.stroke();
    if(s.fill){
      ctx.lineTo(pad + (s.data.length-1)*xStep, cssH-pad); ctx.lineTo(pad, cssH-pad); ctx.closePath();
      ctx.fillStyle = s.fillColor || (s.color+'26'); ctx.fill();
    }
  });
  ctx.setLineDash([]);
  ctx.fillStyle = '#9BAEA0'; ctx.font = '9px "IBM Plex Mono", monospace';
  const step = Math.max(1, Math.ceil(labels.length/6));
  labels.forEach((l,i)=>{ if(i % step === 0) ctx.fillText(l, pad + i*xStep - 8, cssH - 5); });
}

// ---------------- MODAL ----------------
const modalOverlay = document.getElementById('modalOverlay');
function openModal(title, bodyHtml, onConfirm){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  modalOverlay.classList.add('show');
  const confirmBtn = document.getElementById('modalConfirm');
  const newBtn = confirmBtn.cloneNode(true); confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
  newBtn.addEventListener('click', ()=>{ modalOverlay.classList.remove('show'); if(onConfirm) onConfirm(); });
}
document.getElementById('modalCancel').addEventListener('click', ()=> modalOverlay.classList.remove('show'));

      <button class="sos-btn" id="mSosBtn">🆘 SOS — Send Emergency Alert</button>
    </div>

    <div class="m-screen" id="m-detail">
      <div class="m-h1">Turkana Basin</div><div class="m-sub">Detected via GPS · 7-day trend</div>
      <div id="mDetailSkeleton"><div class="skeleton" style="height:120px;"></div><div class="skeleton" style="width:80%;"></div><div class="skeleton" style="width:60%;"></div></div>
      <div id="mDetailContent" style="display:none;">
        <div class="chart-box"><canvas id="mTrendChart" height="140"></canvas></div>
        <div style="font-size:13px; color:var(--sand-dim); margin-top:12px; line-height:1.6;">Village advisory: relocate cattle to Zone B before nightfall — water reserves will deplete within 36 hours.</div>
        <input class="search-box" list="mVillageList" style="margin-top:12px;" placeholder="Search another zone…">
        <datalist id="mVillageList"><option>Wajir</option><option>Marsabit</option><option>Turkana Basin</option><option>Dolo Ado</option><option>Moyale</option><option>Garissa</option><option>Gedo</option><option>Baidoa</option></datalist>
        <div style="font-family:var(--mono); font-size:10px; color:var(--sand-dim); margin-top:10px;">📍 GPS → falls back to cell-tower triangulation → manual entry if both fail</div>
      </div>
    </div>

    <div class="m-screen" id="m-map">
      <div class="m-h1">Map</div><div class="m-sub">Cached tiles · pinch to zoom</div>
      <div id="mMapSkeleton"><div class="skeleton" style="height:200px;"></div></div>
      <div id="mMapContent" style="display:none;">
        <div class="mini-mosaic" id="mMiniMosaic"></div>
        <div class="map-legend" style="margin-top:12px;"><div class="legend-item"><span class="legend-swatch" style="background:var(--green)"></span>Go</div><div class="legend-item"><span class="legend-swatch" style="background:var(--yellow)"></span>Prepare</div><div class="legend-item"><span class="legend-swatch" style="background:var(--red)"></span>Evacuate</div></div>
        <div style="display:flex; gap:8px; margin-top:14px;"><button class="btn-sm">－ Zoom</button><button class="btn-sm">＋ Zoom</button></div>
      </div>
    </div>

    <div class="m-screen" id="m-report">
      <div class="m-h1">Report</div><div class="m-sub">What are you seeing?</div>
      <div class="quick-report-grid" id="mQuickReport">${['Flood','Drought','Pest','Water Found'].map(r=>`<button data-report="${r}">${r}</button>`).join('')}</div>
      <div id="mReportError" style="display:none; font-family:var(--mono); font-size:10.5px; color:var(--red); margin-top:8px;">Select a report type first.</div>
      <button class="btn-sm" id="mCameraBtn" style="margin-top:14px; width:100%; padding:12px;">📷 Attach photo</button>
      <div id="mPhotoNote" style="display:none; font-family:var(--mono); font-size:10.5px; color:var(--teal); margin-top:6px;">✓ Photo attached</div>
      <div style="font-family:var(--mono); font-size:10.5px; color:var(--sand-dim); margin-top:10px;">📍 GPS auto-tagged: 3.12°N, 35.60°E</div>
      <textarea placeholder="Add details…" style="width:100%; margin-top:10px; min-height:80px;"></textarea>
      <button class="primary-btn" id="mSubmitReport">Submit report</button>
      <button class="fab" id="mFab">＋</button>
    </div>

    <div class="m-screen" id="m-inbox">
      <div class="m-h1">Alerts inbox</div>
      <div class="m-sub" style="text-transform:none; letter-spacing:0;">Tap an alert to open its full detail</div>
      <div id="mInboxList">${alerts.map((a,i)=>`<div class="inbox-item" data-inbox="${i}"><div class="unread-dot"></div><div><div class="txt">[${a.code}] ${a.loc}</div><div class="t">${a.window} · ${a.conf}</div></div></div>`).join('')}</div>
    </div>

    <div class="m-screen" id="m-settings">
      <div class="m-h1">Settings</div>
      <div class="settings-row"><span>Language</span><select style="font-family:var(--mono); font-size:11px;"><option>English</option><option>Kiswahili</option><option>አማርኛ</option><option>Af-Soomaali</option></select></div>
      <div class="settings-row"><span>Push notifications</span><div class="switch on" data-toggle></div></div>
      <div class="settings-row"><span>SMS notifications</span><div class="switch on" data-toggle></div></div>
      <div class="settings-row"><span>Voice call alerts</span><div class="switch" data-toggle></div></div>
      <div class="settings-row"><span>App version</span><span class="mono" style="font-size:11px; color:var(--sand-dim);">2.4.1</span></div>
      <button class="btn-sm" id="mClearCache" style="margin-top:16px; width:100%; padding:12px;">Clear cached data</button>
      <button class="btn-sm danger" id="mLogout" style="margin-top:10px; width:100%; padding:12px;">Log out</button>
      <div id="backendStatusChip"></div>
    </div>
  `;

  renderMosaic(document.getElementById('mMiniMosaic'), cellStates);

  document.getElementById('mSendOtp').addEventListener('click', async ()=>{
    const phone = document.getElementById('mPhoneInput').value.trim();
    const btn = document.getElementById('mSendOtp');
    btn.textContent = 'Sending…';
    try{
      const data = await apiFetch('/auth/otp', { method:'POST', body:{ phone } });
      document.getElementById('mOtpHint').textContent = data.dev_hint_code
        ? `Dev mode: code is ${data.dev_hint_code} (sent via mock SMS — see backend console)` : 'Code sent via SMS.';
    } catch(err){
      document.getElementById('mOtpHint').textContent = 'Backend unreachable — demo mode: enter any 6 digits.';
    } finally {
      btn.textContent = 'Send OTP';
      document.getElementById('mOtpWrap').style.display='block';
      document.querySelector('#mOtpBoxes input').focus();
      
      // OTP Auto-Read via WebOTP API (Checkpoint 6.2)
      if ('credentials' in navigator) {
        try {
          const otp = await navigator.credentials.get({ otp: { transport: ['sms'] } });
          if (otp && otp.code) {
             const codeBoxes = document.querySelectorAll('#mOtpBoxes input');
             for(let i = 0; i < 6 && i < otp.code.length; i++){
                 codeBoxes[i].value = otp.code[i];
             }
             document.getElementById('mVerifyOtp').click();
          }
        } catch (e) { console.log('WebOTP auto-read failed or unsupported.', e); }
      }
    }
  });
  document.getElementById('mOtpBoxes').addEventListener('input', (e)=>{
    if(e.target.value && e.target.nextElementSibling) e.target.nextElementSibling.focus();
  });
  document.getElementById('mVerifyOtp').addEventListener('click', async ()=>{
    const phone = document.getElementById('mPhoneInput').value.trim();
    const code = Array.from(document.querySelectorAll('#mOtpBoxes input')).map(i=>i.value).join('');
    const errEl = document.getElementById('mOtpError');
    errEl.style.display = 'none';
    let success = false;
    try{
      const data = await apiFetch('/auth/verify', { method:'POST', body:{ phone, code } });
      mobileAccessToken = data.access_token;
      success = true;
    } catch(err){
      if(code.length === 6){
        success = true; // demo fallback so the flow still completes when the backend is offline
      } else {
        errEl.style.display='block';
      }
    }
    if(success){
      document.getElementById('mAutoLoginNote').style.display='block';
      setTimeout(()=> goToScreen('home'), 700);
    }
  });
  const badgeMap = {GREEN:{icon:'✓', txt:'Ideal planting window. Apply nitrogen fertilizer today.'}, YELLOW:{icon:'⚠', txt:'Sandbag low-lying areas. Move poultry indoors in 24hrs.'}, RED:{icon:'⛔', txt:'Relocate cattle to Zone B immediately. Water reserves deplete.'}};
  document.querySelectorAll('.badge-switch button').forEach(b=> b.addEventListener('click', ()=>{
    const code=b.dataset.code; const el=document.getElementById('mActionBadge');
    el.className='action-badge '+code; el.innerHTML=`<div class="code">${badgeMap[code].icon} Code ${code.charAt(0)+code.slice(1).toLowerCase()}</div><div class="txt">${badgeMap[code].txt}</div>`;
  }));
  document.getElementById('mListenBtn').addEventListener('click', (e)=>{
    const txt = document.querySelector('#mActionBadge .txt').textContent;
    if(!('speechSynthesis' in window)){ e.target.textContent='🔇 TTS not supported'; setTimeout(()=> e.target.textContent='🔊 Listen', 1500); return; }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(txt);
    utter.rate = 0.95;
    e.target.textContent = '⏸ Playing…';
    utter.onend = ()=> e.target.textContent = '🔊 Listen';
    utter.onerror = ()=> e.target.textContent = '🔊 Listen';
    window.speechSynthesis.speak(utter);
  });
  document.getElementById('mSosBtn').addEventListener('click', ()=>{
    openModal('Send SOS?', 'This sends your live GPS location and a "HELP" message to the nearest NGO response team via SMS — even offline. Use only in a genuine emergency.', async ()=>{
      const btn = document.getElementById('mSosBtn');
      btn.textContent = '📡 Sending SOS…'; btn.style.animation='none';
      if(navigator.vibrate) navigator.vibrate([100,50,100]);
      
      // Checkpoint 6.8: SOS SMS fallback Intent
      window.location.href = "sms:12345?body=HELP%20SOS%20GPS%203.12N%2035.60E%20Immediate%20assistance%20required";
      
      setTimeout(()=>{
        btn.textContent = '✓ SOS sent — GPS 3.12°N, 35.60°E';
        btn.style.background = 'var(--green)';
        setTimeout(()=>{ btn.textContent='🆘 SOS — Send Emergency Alert'; btn.style.background=''; btn.style.animation=''; }, 3000);
      }, 1200);
    });
  });
  document.querySelectorAll('#mQuickReport button').forEach(b=> b.addEventListener('click', ()=> b.classList.toggle('active')));
  document.getElementById('mCameraBtn').addEventListener('click', async ()=> {
      // Checkpoint 6.9: Capacitor Camera plugin and compression
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Camera) {
          try {
              const image = await window.Capacitor.Plugins.Camera.getPhoto({
                  quality: 50, // compress to < 1MB
                  allowEditing: false,
                  resultType: window.Capacitor.Plugins.Camera.CameraResultType.DataUrl
              });
              document.getElementById('mPhotoNote').style.display='block';
          } catch(e) { console.log(e); }
      } else {
          document.getElementById('mPhotoNote').style.display='block';
      }
  });
  document.getElementById('mFab').addEventListener('click', (e)=>{
    if(navigator.vibrate) navigator.vibrate(30);
    e.target.style.transform='scale(0.85)'; setTimeout(()=> e.target.style.transform='scale(1)', 120);
    
    // Checkpoint 6.7: Geolocation GPS Fallback
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Geolocation) {
        window.Capacitor.Plugins.Geolocation.getCurrentPosition().catch(err => {
            console.log("GPS Failed, prompting for village input");
            let manualInput = prompt("GPS is disabled or unavailable. Please enter your village manually:");
            if(manualInput) { console.log("Manual village: " + manualInput); }
        });
    }
  });
  document.getElementById('mSubmitReport').addEventListener('click', async ()=>{
    const picked = document.querySelector('#mQuickReport button.active');
    if(!picked){ document.getElementById('mReportError').style.display='block'; return; }
    document.getElementById('mReportError').style.display='none';
    const rawText = document.querySelector('#m-report textarea').value.trim() || picked.dataset.report;
    const phone = (document.getElementById('mPhoneInput')||{}).value || '+254700000213';
    let refId = 'RPT-' + new Date().getFullYear() + '-' + Math.floor(10000 + Math.random()*89999);
    try{
      const data = await apiFetch('/feedback/submit', { method:'POST', body:{
        phone, lat: 3.12, lon: 35.60, raw_text: rawText,
      }, token: mobileAccessToken });
      if(data.reference) refId = data.reference;
    } catch(err){ /* offline — the reference above still shows, upload happens next sync per the UI copy */ }
    openModal('✓ Report sent', `Your "${picked.dataset.report}" report was queued for sync — reference <b>${refId}</b>.<br><br>It will upload automatically once you're back online.`, ()=>{
      document.querySelectorAll('#mQuickReport button').forEach(b=>b.classList.remove('active'));
      document.getElementById('mPhotoNote').style.display='none';
      document.querySelector('#m-report textarea').value='';
    });
  });
  document.querySelectorAll('#mInboxList .inbox-item').forEach(it=> it.addEventListener('click', ()=>{
    it.classList.add('read');
    goToScreen('detail');
  }));
  document.getElementById('mClearCache').addEventListener('click', ()=> openModal('Clear cached data', 'This removes offline map tiles and cached predictions. You will need a connection to reload them.', async ()=>{
    if('caches' in window){ const keys = await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
  }));
  document.getElementById('mLogout').addEventListener('click', ()=> openModal('Log out', 'You will need to verify your phone number again to sign back in.', ()=>{
    mobileAccessToken = null;
    goToScreen('splash');
  }));

  // onboarding 3-slide carousel
  let onboardIdx = 0;
  document.getElementById('mOnboardNext').addEventListener('click', ()=>{
    if(onboardIdx < 2){
      document.querySelector(`.m-onboard-slide[data-slide="${onboardIdx}"]`).style.display='none';
      onboardIdx++;
      document.querySelector(`.m-onboard-slide[data-slide="${onboardIdx}"]`).style.display='block';
      document.querySelectorAll('#mOnboardDots span').forEach((d,i)=> d.classList.toggle('active', i===onboardIdx));
      document.getElementById('mOnboardNext').textContent = onboardIdx===2 ? 'Get Started' : 'Next';
    } else {
      openModal('Choose your language', `<div class="lang-grid">${['English','Kiswahili','አማርኛ','Af-Soomaali'].map((l,i)=>`<button class="lang-pick-btn ${i===0?'active':''}" style="background:var(--panel); border:1px solid var(--line); color:var(--sand); padding:12px; border-radius:8px; cursor:pointer;">${l}</button>`).join('')}</div>`, ()=>{
        goToScreen('login');
      });
    }
  });
}

function revealScreenContent(key){
  if(key==='detail'){
    document.getElementById('mDetailSkeleton').style.display='block'; document.getElementById('mDetailContent').style.display='none';
    setTimeout(()=>{
      document.getElementById('mDetailSkeleton').style.display='none'; document.getElementById('mDetailContent').style.display='block';
      drawLineChart('mTrendChart', [{ data:[30,42,38,55,61,74,91], color:'#C1453D', fill:true }], ['D-6','D-5','D-4','D-3','D-2','D-1','Today'], {height:140});
    }, 500);
  }
  if(key==='map'){
    document.getElementById('mMapSkeleton').style.display='block'; document.getElementById('mMapContent').style.display='none';
    setTimeout(()=>{ document.getElementById('mMapSkeleton').style.display='none'; document.getElementById('mMapContent').style.display='block'; }, 500);
  }
}

renderMobileScreens();
screenSelector.addEventListener('click', (e)=>{
  const btn = e.target.closest('button'); if(!btn) return;
  goToScreen(btn.dataset.screen);
});
document.addEventListener('click', (e)=>{
  if(e.target.classList.contains('lang-pick-btn')){
    document.querySelectorAll('.lang-pick-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
  }
  if(e.target.closest('[data-toggle]')){
    e.target.closest('[data-toggle]').classList.toggle('on');
  }
});

checkBackendReachable();
setInterval(checkBackendReachable, 15000);
window.addEventListener('online', ()=> document.getElementById('mOfflineSnackbar').style.display='none');
window.addEventListener('offline', ()=> document.getElementById('mOfflineSnackbar').style.display='flex');

// Capacitor Network Plugin Checkpoint 6.3
if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Network) {
    window.Capacitor.Plugins.Network.addListener('networkStatusChange', status => {
        document.getElementById('mOfflineSnackbar').style.display = status.connected ? 'none' : 'flex';
    });
    window.Capacitor.Plugins.Network.getStatus().then(status => {
        if (!status.connected) document.getElementById('mOfflineSnackbar').style.display='flex';
    });
} else {
    if(!navigator.onLine) document.getElementById('mOfflineSnackbar').style.display='flex';
}

// Capacitor Push Notifications Checkpoint 6.10
if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications) {
    window.Capacitor.Plugins.PushNotifications.addListener('pushNotificationActionPerformed', notification => {
        console.log('Push notification action performed', notification.action);
        goToScreen('inbox');
        setTimeout(() => goToScreen('detail'), 300); // deep linking to detail page
    });
}
</script>
</body>
</html>
